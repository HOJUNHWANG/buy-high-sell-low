name: Seed Market History

on:
  # Automatically backfill the tracked set after a market-universe change is
  # merged to main. Cronjob.org does not need to call this workflow.
  push:
    branches: [main]
    paths:
      - "scripts/tickers.py"
      - "scripts/seed_history.py"
      - ".github/workflows/seed-market-history.yml"
  workflow_dispatch:
    inputs:
      tickers:
        description: "Space-separated tickers to backfill"
        required: true
        default: "HONA OEF USDC-USD TRX-USD ZEC-USD XLM-USD XMR-USD BCH-USD LTC-USD DOT-USD AAVE-USD"

concurrency:
  group: seed-market-history
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/seed_history.py $TICKERS
        env:
          # workflow_dispatch can override this; push runs use the maintained
          # default list below instead of accidentally seeding the full universe.
          TICKERS: ${{ inputs.tickers || 'HONA OEF USDC-USD TRX-USD ZEC-USD XLM-USD XMR-USD BCH-USD LTC-USD DOT-USD AAVE-USD' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
